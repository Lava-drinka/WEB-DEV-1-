<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apple </title>
    <style>
        body {
            margin: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #fff;
            color: #333;
        }

        /* Top Navigation */
        .navbar {
            background-color: #333;
            color: white;
            padding: 10px 0;
            text-align: center;
        }

        .navbar a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-size: 14px;
        }

        .navbar a:hover {
            opacity: 0.7;
        }

      
        .hero {
            text-align: center;
            padding: 80px 20px;
            background-color: White;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .hero p {
            font-size: 20px;
            color: #666;
        }

        .hero img {
            width: 60%;
            margin-top: 30px;
        }

        /* Product Grid */
        .products {
            display: flex;
            flex-wrap: wrap;
        }

        .product {
            width: 50%;
            text-align: center;
            padding: 50px 20px;
            box-sizing: border-box;
        }

        .product img {
            width: 70%;
        }

        .product h2 {
            font-weight: 500;
        }

        
        .footer {
            background-color: #f2f2f2;
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="navbar">
    
        <a href="#">Mac </a>
        <a href="#">iPad</a>
        <a href="#">music</a>
        <a href="#">watch</a>
        <a href="#">Support</a>
    </div>

    <form action="https://www.google.com/search" method="get">
            <input type="search" name="q" placeholder="search apple.com">
            <button type="submit">Search</button>
    </form>

    
    <div class="hero">
        <h1>iPhone 6s</h1>
        <p>The only thing that's changed is everything.</p>   
    </div>

    
    <div class="products">
        <div class="product">
            <h2>MacBook</h2>
            <img src="macbook-pro.jpg">
        </div>
        <div class="product">
            <h2>iPad Pro</h2>
            <img src="new-ipad.jpg">
        </div>
        <div class="product">
            <h2>Apple Watch</h2>
            <img src="Apple watch.jpg">
        </div>
        <div class="product">
            <h2>Apple Music</h2>
            <img src="air-pods.jpg">
        </div>
    </div>

    
    <div class="footer">
        © 2015 Apple Inc. All rights reserved.
    </div>

</body>
</html>
